<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="100%" height="100%">
  <defs>
    <linearGradient id="darkCanvas" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121318" />
      <stop offset="100%" stop-color="#090a0d" />
    </linearGradient>

    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d8c3a5" />
      <stop offset="100%" stop-color="#ebd5b7" />
    </linearGradient>

    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a3b18a" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#a3b18a" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Canvas Background -->
  <rect width="1200" height="675" fill="url(#darkCanvas)" />

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="675" fill="#181920" />
  <text x="30" y="50" font-family="Arial, sans-serif" font-weight="900" font-size="20" fill="#d8c3a5">HyTrack</text>
  <text x="30" y="68" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#a3b18a" letter-spacing="1">FINANCE ENGINE</text>

  <!-- Sidebar Nav Menu -->
  <g transform="translate(20, 110)" font-family="Arial, sans-serif" font-size="13">
    <rect x="0" y="0" width="180" height="38" rx="8" fill="#252732" />
    <text x="35" y="24" font-weight="700" fill="#d8c3a5">📊 Dashboard</text>

    <text x="35" y="70" fill="#8f93a2">💸 Income &amp; Expenses</text>
    <text x="35" y="110" fill="#8f93a2">🎯 Monthly Budgets</text>
    <text x="35" y="150" fill="#8f93a2">📑 Analytics &amp; Reports</text>
    <text x="35" y="190" fill="#8f93a2">⚙️ Account Settings</text>
  </g>

  <!-- Main Top Header -->
  <g transform="translate(250, 30)">
    <text x="0" y="24" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">Financial Analytics &amp; Tracking</text>
    <text x="0" y="44" font-family="Arial, sans-serif" font-size="12" fill="#8f93a2">Real-time overview of budgets, active subscriptions, and cash flow</text>

    <rect x="760" y="0" width="130" height="36" rx="8" fill="url(#goldGradient)" />
    <text x="780" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#121318">+ Log Transaction</text>
  </g>

  <!-- Top Metric Cards -->
  <g transform="translate(250, 100)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="270" height="110" rx="12" fill="#181920" stroke="#2d303e" stroke-width="1" />
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="12" fill="#8f93a2">TOTAL BALANCE</text>
    <text x="20" y="65" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">₹1,48,250</text>
    <text x="20" y="90" font-family="Arial, sans-serif" font-size="11" fill="#a3b18a">↑ +14.2% from last month</text>

    <!-- Card 2 -->
    <rect x="290" y="0" width="270" height="110" rx="12" fill="#181920" stroke="#2d303e" stroke-width="1" />
    <text x="310" y="30" font-family="Arial, sans-serif" font-size="12" fill="#8f93a2">MONTHLY EXPENSES</text>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#ff6b6b">₹34,800</text>
    <text x="310" y="90" font-family="Arial, sans-serif" font-size="11" fill="#a3b18a">Within target ₹45,000 budget</text>

    <!-- Card 3 -->
    <rect x="580" y="0" width="290" height="110" rx="12" fill="#181920" stroke="#2d303e" stroke-width="1" />
    <text x="600" y="30" font-family="Arial, sans-serif" font-size="12" fill="#8f93a2">TOTAL SAVINGS RATIO</text>
    <text x="600" y="65" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#d8c3a5">72.4%</text>
    <text x="600" y="90" font-family="Arial, sans-serif" font-size="11" fill="#a3b18a">Target savings goal reached</text>
  </g>

  <!-- Main Chart Card -->
  <g transform="translate(250, 235)">
    <rect x="0" y="0" width="560" height="390" rx="12" fill="#181920" stroke="#2d303e" stroke-width="1" />
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Cashflow Trend Analytics</text>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="11" fill="#8f93a2">Income vs Expense trajectory over past 6 months</text>

    <!-- Chart Grid Lines -->
    <line x1="40" y1="120" x2="520" y2="120" stroke="#252732" stroke-width="1" />
    <line x1="40" y1="180" x2="520" y2="180" stroke="#252732" stroke-width="1" />
    <line x1="40" y1="240" x2="520" y2="240" stroke="#252732" stroke-width="1" />
    <line x1="40" y1="300" x2="520" y2="300" stroke="#252732" stroke-width="1" />

    <!-- Chart Smooth Area Path -->
    <path d="M 40 280 Q 120 220, 200 240 T 360 140 T 520 160 L 520 320 L 40 320 Z" fill="url(#chartGradient)" />
    <path d="M 40 280 Q 120 220, 200 240 T 360 140 T 520 160" fill="none" stroke="#a3b18a" stroke-width="3" />

    <!-- Secondary Line -->
    <path d="M 40 310 Q 120 290, 200 300 T 360 260 T 520 280" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="4,4" />

    <!-- X-Axis Labels -->
    <g transform="translate(40, 345)" font-family="Arial, sans-serif" font-size="11" fill="#8f93a2">
      <text x="0" y="0">Jan</text>
      <text x="90" y="0">Feb</text>
      <text x="180" y="0">Mar</text>
      <text x="270" y="0">Apr</text>
      <text x="360" y="0">May</text>
      <text x="450" y="0">Jun</text>
    </g>
  </g>

  <!-- Recent Transactions Card -->
  <g transform="translate(830, 235)">
    <rect x="0" y="0" width="310" height="390" rx="12" fill="#181920" stroke="#2d303e" stroke-width="1" />
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Recent Logs</text>

    <g transform="translate(20, 65)" font-family="Arial, sans-serif" font-size="12">
      <text x="0" y="15" font-weight="700" fill="#ffffff">Full-Stack Client Invoice</text>
      <text x="0" y="32" font-size="10" fill="#8f93a2">Income • Today</text>
      <text x="210" y="22" font-weight="800" fill="#a3b18a">+₹45,000</text>
      <line x1="0" y1="45" x2="270" y2="45" stroke="#252732" />

      <text x="0" y="65" font-weight="700" fill="#ffffff">AWS Cloud Hosting</text>
      <text x="0" y="82" font-size="10" fill="#8f93a2">Server • Yesterday</text>
      <text x="210" y="72" font-weight="800" fill="#ff6b6b">-₹2,450</text>
      <line x1="0" y1="95" x2="270" y2="95" stroke="#252732" />

      <text x="0" y="115" font-weight="700" fill="#ffffff">Vercel Pro Subscription</text>
      <text x="0" y="132" font-size="10" fill="#8f93a2">SaaS • 2 days ago</text>
      <text x="210" y="122" font-weight="800" fill="#ff6b6b">-₹1,600</text>
      <line x1="0" y1="145" x2="270" y2="145" stroke="#252732" />

      <text x="0" y="165" font-weight="700" fill="#ffffff">Stripe Payout Transfer</text>
      <text x="0" y="182" font-size="10" fill="#8f93a2">Income • 3 days ago</text>
      <text x="210" y="172" font-weight="800" fill="#a3b18a">+₹18,500</text>
    </g>
  </g>
</svg>
